name: DailyHealthScore
options:
  bundleIdPrefix: com.dailyhealthscore
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  DailyHealthScore:
    type: application
    platform: iOS
    sources:
      - path: DailyHealthScore
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dailyhealthscore.app
      INFOPLIST_FILE: DailyHealthScore/Info.plist
      CODE_SIGN_ENTITLEMENTS: DailyHealthScore/DailyHealthScore.entitlements
      TARGETED_DEVICE_FAMILY: "1,2"
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: DailyHealthScore/DailyHealthScore.entitlements
