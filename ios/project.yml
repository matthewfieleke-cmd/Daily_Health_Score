name: DailyHealthScore
options:
  bundleIdPrefix: com.dailyhealthscore
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  DailyHealthScore:
    type: application
    platform: iOS
    sources:
      - path: DailyHealthScore
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dailyhealthscore.app
      INFOPLIST_FILE: DailyHealthScore/Info.plist
      CODE_SIGN_ENTITLEMENTS: DailyHealthScore/DailyHealthScore.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      # iPhone-only. Adding iPad ("1,2") would also require declaring iPad
      # interface orientations in Info.plist or setting UIRequiresFullScreen.
      TARGETED_DEVICE_FAMILY: "1"
      MARKETING_VERSION: "1.4.0"
      CURRENT_PROJECT_VERSION: "8"
    entitlements:
      path: DailyHealthScore/DailyHealthScore.entitlements

  DailyHealthScoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyHealthScoreTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: DailyHealthScore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dailyhealthscore.app.tests
      GENERATE_INFOPLIST_FILE: "YES"
      TARGETED_DEVICE_FAMILY: "1"
schemes:
  DailyHealthScore:
    build:
      targets:
        DailyHealthScore: all
        DailyHealthScoreTests: [test]
    test:
      targets:
        - DailyHealthScoreTests
